# TODO poweroff and restart button

general {
    hide_cursor = true
}

background {
    monitor =
    path = $HOME/.config/hypr/asa_bg.jpeg
    color = rgba(255, 0, 0, 255)
    blur_passes = 2
    blur_size = 6
    contrast = 1
    brightness = 0.8
    vibrancy = 0.4
    vibrancy_darkness = 0.2
}

# Profile image
image {
    monitor =
    path = $HOME/Downloads/malenia.jpg
    size = 200
    position = 0, 20
    rounding = -1
}

# Image border
image {
    monitor =
    path = $HOME/Downloads/MaleniaGreatRune.png
    size = 350
    position = 0, 20
    border_size = 0
}

# Malenia part 1
image {
    monitor =
    path = $HOME/Downloads/part1.png
    size = 600
    # position = cmd[update:1000] $HOME/Downloads/pos_test.sh, cmd[update:1000] $HOME/Downloads/pos_test.sh
    position = 50, -50
    border_size = 0
    halign = left
    valign = top
    rounding = 0
}

# Malenia part 2
image {
    monitor =
    path = $HOME/Downloads/part2.png
    size = 600
    position = -50, 60
    border_size = 0
    halign = right
    valign = bottom
    rounding = 0
}

# Amongi
image {
    monitor =
    path = $HOME/Downloads/amongi.png
    size = 100
    position = 240, 165
    border_size = 0
    halign = center
    valign = center
    rounding = 0
}

# Password
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(112, 138, 167, 1)
    inner_color = rgba(112, 138, 167, 0.2)
    font_color = rgba(205, 214, 244, 1)
    fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, -130
    halign = center
    valign = center
}

# KB layout
label {
  monitor =
  text = $LAYOUT
  color = rgba(112, 138, 167, 1)
  font_size = 20
  font_family = JetBrains Mono
  position = 0, -195
  halign = center
  valign = center

}

# Greeting
label {
  monitor =
  text = Hello, $USER
  # text = cmd[update:1000] $HOME/Downloads/test_lock.py
#  color = rgba(112, 138, 167, 1)
  color = rgba(255, 255, 255, 1)
  font_size = 40
  font_family = JetBrains Mono Thin
  position = 0, 170
  halign = center
  valign = center
}

# Time
label {
  monitor =
  text = $TIME
  color = rgba(255, 255, 255, 1)
  font_size = 100
  font_family = JetBrains Mono Thin
  position = 45, -365
  halign = left
  valign = center
}

# Date
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(255, 255, 255, 1)
  font_size = 30
  font_family = JetBrains Mono
  position = 50, -465
  halign = left
  valign = center
}
